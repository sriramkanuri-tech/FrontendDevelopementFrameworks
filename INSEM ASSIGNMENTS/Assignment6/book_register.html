<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store - Registration</title>
</head>
<body>
    <h1>Online Book Store - User Registration</h1>

    <nav>
        <a href="book_login.html">Login</a> |
        <a href="book_register.html">Register</a>
    </nav>
    <br>

    <form>
        <label>Full Name:</label>
        <input type="text" name="fullname"><br><br>

        <label>Email ID:</label>
        <input type="email" name="email"><br><br>

        <label>Create Password:</label>
        <input type="password" name="password"><br><br>

        <label>Mobile Number:</label>
        <input type="text" name="mobile"><br><br>

        <label>Address:</label>
        <textarea name="address" rows="3" cols="30"></textarea><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
